# Database Configuration (Using H2 In-Memory for easy testing)
spring.datasource.url=jdbc:h2:mem:protecsuredb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Real Email SMTP Configuration (Gmail)
# IMPORTANT: To actually send emails to yourself, replace these two lines:
spring.mail.username=YOUR_GMAIL_HERE@gmail.com
spring.mail.password=YOUR_16_DIGIT_APP_PASSWORD_HERE
# ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration (256-bit secret key)
jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
jwt.expirationMs=86400000

# Server Port
server.port=8080
